# Compose content for the dockhand-managed "funniedev-website" stack on quailman.lan.
# Authoritative copy lives in this repo; bin/deploy.sh uploads it via the dockhand API.
#
# $$_SERVER (doubled) escapes compose interpolation so the literal $_SERVER reaches PHP.
# FUNNIE_DB_PASSWORD is provided by the stack's dockhand envVars (secret).

services:
  funniedev-wordpress:
    image: wordpress:6.9.4-php8.3-apache
    container_name: funniedev-wordpress
    restart: unless-stopped
    environment:
      TZ: "America/Sao_Paulo"
      WORDPRESS_DB_HOST: db-mysql
      WORDPRESS_DB_NAME: funnie
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${FUNNIE_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', false);
        define('DISALLOW_FILE_EDIT', true);
        if (!empty($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
      PHP_MEMORY_LIMIT: 512M
      PHP_POST_MAX_SIZE: 100M
      PHP_UPLOAD_MAX_FILESIZE: 100M
    volumes:
      - /root/apps/sites/funnie.dev/app:/var/www/html
    networks:
      quailman-network:

networks:
  quailman-network:
    external: true
